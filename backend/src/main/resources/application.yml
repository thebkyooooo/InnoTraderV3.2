spring:
  application:
    name: innotrader-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/innotrader}
    username: ${DB_USERNAME:innotrader}
    password: ${DB_PASSWORD:innotrader}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.format_sql: true
      hibernate.default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits}
  access-token-validity-seconds: 900
  refresh-token-validity-seconds: 1209600

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.innotrader: DEBUG
    org.springframework.security: INFO
