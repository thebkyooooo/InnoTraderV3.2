spring:
  application:
    name: innotrader-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/innotrader}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.format_sql: true
      hibernate.default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}
  # 리버스 프록시(Railway) 뒤에서 X-Forwarded-Proto/Host 신뢰 → https 스킴 인식 (Swagger URL/Secure 쿠키 정상화)
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-seconds: 900
  refresh-token-validity-seconds: 1209600

app:
  # 실시간 시세 WebSocket 브로드캐스트 주기 (ms). 환경변수 BROADCAST_MS 로 재정의 가능.
  broadcast-ms: ${BROADCAST_MS:1000}
  # 리프레시 토큰 쿠키 SameSite — 동일 도메인이면 Strict, 교차 도메인(Railway 등)이면 None
  refresh-cookie:
    same-site: ${REFRESH_COOKIE_SAMESITE:Strict}
  # 기동 시 기본 계정 + 시드 데이터 자동 생성 (운영에선 APP_SEED_ENABLED=true 로 한시 사용)
  seed:
    enabled: ${APP_SEED_ENABLED:false}

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

logging:
  level:
    com.innotrader: INFO
    org.springframework.security: INFO
